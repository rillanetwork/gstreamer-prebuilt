name: Build GStreamer SDK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "GStreamer version (e.g. 1.26.11)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Build tarballs
        run: |
          chmod +x build-tarball.sh
          ./build-tarball.sh ${{ matrix.arch }}

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-${{ matrix.arch }}
          path: gstreamer-sdk-linux-${{ matrix.arch }}.tar.gz

      - name: Upload plugin bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugins-${{ matrix.arch }}
          path: gstreamer-plugins-*-linux-${{ matrix.arch }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect all tarballs
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          echo "=== Release assets ==="
          ls -lh release/

      - name: Compute SHA-256 hashes
        id: hashes
        run: |
          cd release
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

          # Extract individual hashes for the release body
          for f in *.tar.gz; do
            key=$(echo "$f" | sed 's/\.tar\.gz$//' | sed 's/-/_/g')
            sha=$(sha256sum "$f" | awk '{print $1}')
            echo "${key}_sha256=$sha" >> "$GITHUB_OUTPUT"
          done

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: GStreamer SDK ${{ steps.tag.outputs.tag }}
          body: |
            Pre-built GStreamer SDK and plugin bundles for Linux (hermetic Bazel builds).

            ## Tarballs

            | Tarball | Description |
            |---------|-------------|
            | `gstreamer-sdk-linux-<arch>.tar.gz` | Headers + core link-time libraries |
            | `gstreamer-plugins-core-linux-<arch>.tar.gz` | Core elements (fakesink, queue, …) |
            | `gstreamer-plugins-base-linux-<arch>.tar.gz` | Base plugins (typefind, playback, …) |
            | `gstreamer-plugins-good-linux-<arch>.tar.gz` | Good plugins (matroska, isomp4, …) |
            | `gstreamer-plugins-bad-linux-<arch>.tar.gz` | Bad plugins (tsdemux, hlsdemux, …) |

            Each plugin bundle includes the plugin `.so` files **and** all transitive
            shared library dependencies, so downstream consumers only need to pull in the
            bundles they use.

            ## SHA-256 Checksums

            ```
            $(cat release/checksums.txt)
            ```
          files: release/*.tar.gz
